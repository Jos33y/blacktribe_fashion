<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0C0C0C"/>

  <!-- Subtle border frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Top decorative line -->
  <line x1="520" y1="220" x2="680" y2="220" stroke="#2A2A2A" stroke-width="1"/>

  <!-- BLACKTRIBE wordmark -->
  <text
    x="600"
    y="310"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="8"
    fill="#EDEBE8"
    text-anchor="middle"
    dominant-baseline="middle"
  >BLACKTRIBE</text>

  <!-- Tagline -->
  <text
    x="600"
    y="365"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="8"
    fill="#9B9894"
    text-anchor="middle"
    dominant-baseline="middle"
    text-transform="uppercase"
  >REDEFINING LUXURY</text>

  <!-- Bottom decorative line -->
  <line x1="520" y1="410" x2="680" y2="410" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Domain -->
  <text
    x="600"
    y="540"
    font-family="'Courier New', monospace"
    font-size="11"
    font-weight="400"
    letter-spacing="3"
    fill="#6A6662"
    text-anchor="middle"
    dominant-baseline="middle"
  >BLACKTRIBEFASHION.COM</text>
</svg>
